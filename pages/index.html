<!DOCTYPE html>
<html>
<head>
<title>AccessiMap</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="index.css"/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!--  main JS -->
<script src="main.js"></script>

<style>
#map {
width: 100%;
height: 100vh;
z-index: 1;
}
</style>
</head>

<body>

    <!-- Page content -->
<div class="main">
  <div id="map"></div>
</div>

<!-- Side navigation -->
<div class="sidenav">

  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Clients</a>
  <a href="#">Contact</a>
</div>



<script>
// Create map centered on Workday 
var map = L.map('map').setView([53.34785, -6.27576], 13);

// Add map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Add a marker
L.marker([53.34785, -6.27576]).addTo(map)
.bindPopup('Workday')
.openPopup();
</script>

</body>
</html>
